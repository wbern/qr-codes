<!DOCTYPE html>
<html>
<head>
  <title>Go Cards Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f0f0f0; padding: 2rem; }
    h1 { text-align: center; margin-bottom: 2rem; font-weight: 300; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1200px; margin: 0 auto; }
    .card { text-align: center; }
    .card img { width: 100%; max-width: 500px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .card p { margin-top: 0.5rem; color: #666; font-size: 0.85rem; }
    .card a { color: #555; text-decoration: none; border: 1px solid #ccc; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.8rem; margin-left: 0.5rem; }
    .card a:hover { background: #333; color: #fff; }
  </style>
</head>
<body>
  <h1>Go-Generated Business Cards</h1>
  <div class="grid">
    <div class="card">
      <img src="chessreel.png">
      <p>chessreel <a href="chessreel.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="chessreel-dark.png">
      <p>chessreel-dark <a href="chessreel-dark.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="chessparty.png">
      <p>chessparty <a href="chessparty.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="chessparty-dark.png">
      <p>chessparty-dark <a href="chessparty-dark.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="bernting.png">
      <p>bernting <a href="bernting.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="bernting-dark.png">
      <p>bernting-dark <a href="bernting-dark.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="kendev.png">
      <p>kendev <a href="kendev.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="kendev-dark.png">
      <p>kendev-dark <a href="kendev-dark.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="henrik.png">
      <p>henrik <a href="henrik.pdf">PDF</a></p>
    </div>
    <div class="card">
      <img src="henrik-dark.png">
      <p>henrik-dark <a href="henrik-dark.pdf">PDF</a></p>
    </div>
  </div>
</body>
</html>

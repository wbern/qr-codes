<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f0f0; color: #333; padding: 2rem; }
    h1 { text-align: center; margin-bottom: 2rem; font-weight: 300; font-size: 1.8rem; }

    .card {
      width: var(--card-w);
      height: var(--card-h);
      background: #fff;
      margin: 0 auto 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
    }

    .card-label {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.5rem;
      max-width: var(--card-w);
    }

    .qr-container {
      position: absolute;
      width: var(--qr-size);
      height: var(--qr-size);
      top: var(--qr-top);
      left: var(--qr-left);
    }

    .qr-container svg {
      width: 100%;
      height: 100%;
      display: block;
      shape-rendering: crispEdges;
    }

    .card-url {
      position: absolute;
      top: var(--text-top);
      left: var(--text-left);
      font-family: "Fredoka", sans-serif;
      font-weight: 400;
      font-size: var(--text-size);
      color: #999;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .download-btn {
      display: block;
      margin: 0.5rem auto 2rem;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      font-family: inherit;
      color: #555;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .download-btn:hover:not(:disabled) {
      background: #333;
      color: #fff;
    }
    .download-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .card-dark {
      background: #0d0a1f;
    }
    .card-dark .card-url {
      color: rgba(255,255,255,0.5);
    }

    @media print {
      body { background: none; padding: 0; }
      h1, .card-label, .download-btn { display: none; }
      .card {
        box-shadow: none;
        border: 0.5pt solid #ccc;
        page-break-inside: avoid;
        margin: 10mm auto;
      }
    }
  </style>
</head>
<body>
  <h1>Business Cards</h1>

  <div class="card-label">ChessReel</div>
  <div class="card">
    <div class="qr-container" id="qr-chessreel"></div>
    <span class="card-url">https://www.chessreel.com</span>
  </div>
  <button class="download-btn" id="btn-chessreel" disabled>Download Print PDF</button>
  <div class="card card-dark">
    <div class="qr-container" id="qr-chessreel-dark"></div>
    <span class="card-url">https://www.chessreel.com</span>
  </div>
  <button class="download-btn" id="btn-chessreel-dark" disabled>Download Dark PDF</button>

  <div class="card-label">Chess Party</div>
  <div class="card">
    <div class="qr-container" id="qr-chessparty"></div>
    <span class="card-url">https://www.chessreel.com/chessparty</span>
  </div>
  <button class="download-btn" id="btn-chessparty" disabled>Download Print PDF</button>
  <div class="card card-dark">
    <div class="qr-container" id="qr-chessparty-dark"></div>
    <span class="card-url">https://www.chessreel.com/chessparty</span>
  </div>
  <button class="download-btn" id="btn-chessparty-dark" disabled>Download Dark PDF</button>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg2pdf.js@2.3.0/dist/svg2pdf.umd.min.js"></script>
  <script>
    // Shared layout constants (mm) — single source of truth for both preview and PDF
    const TRIM_W = 90, TRIM_H = 55;
    const BLEED = 3;
    const PAGE_W = TRIM_W + 2 * BLEED;   // 96mm
    const PAGE_H = TRIM_H + 2 * BLEED;   // 61mm
    const QR_SIZE = 46;
    const URL_TEXT_HEIGHT = 2;
    const CONTENT_HEIGHT = QR_SIZE + URL_TEXT_HEIGHT;
    const QR_X_IN_TRIM = (TRIM_W - QR_SIZE) / 2;           // 22mm
    const QR_Y_IN_TRIM = (TRIM_H - CONTENT_HEIGHT) / 2;    // 3.5mm
    const QUIET_ZONE = QR_SIZE * 15 / 400;                  // 1.725mm
    const TEXT_X_IN_TRIM = QR_X_IN_TRIM + QUIET_ZONE;       // 23.725mm
    const TEXT_Y_IN_TRIM = QR_Y_IN_TRIM + QR_SIZE + 1;      // 50.5mm
    const DISPLAY_SCALE = 1.4;

    // Set CSS custom properties so preview matches PDF layout exactly
    const r = document.documentElement.style;
    r.setProperty('--card-w', `${TRIM_W * DISPLAY_SCALE}mm`);
    r.setProperty('--card-h', `${TRIM_H * DISPLAY_SCALE}mm`);
    r.setProperty('--qr-size', `${QR_SIZE * DISPLAY_SCALE}mm`);
    r.setProperty('--qr-top', `${QR_Y_IN_TRIM * DISPLAY_SCALE}mm`);
    r.setProperty('--qr-left', `${QR_X_IN_TRIM * DISPLAY_SCALE}mm`);
    r.setProperty('--text-top', `${TEXT_Y_IN_TRIM * DISPLAY_SCALE}mm`);
    r.setProperty('--text-left', `${TEXT_X_IN_TRIM * DISPLAY_SCALE}mm`);
    r.setProperty('--text-size', `${(4.5 * 0.3528) * DISPLAY_SCALE}mm`);
    const cards = [
      { id: "qr-chessreel", url: "https://www.chessreel.com", name: "chessreel", dark: false },
      { id: "qr-chessparty", url: "https://www.chessreel.com/chessparty", name: "chessparty", dark: false },
      { id: "qr-chessreel-dark", url: "https://www.chessreel.com", name: "chessreel-dark", dark: true },
      { id: "qr-chessparty-dark", url: "https://www.chessreel.com/chessparty", name: "chessparty-dark", dark: true },
    ];

    let readyCount = 0;

    cards.forEach(({ id, url, name, dark }) => {
      const dotColor = dark ? "#ffffff" : "#000";
      const bgColor = dark ? "transparent" : "#ffffff";
      const qr = new QRCodeStyling({
        width: 400,
        height: 400,
        type: "svg",
        data: url,
        margin: 0,
        qrOptions: {
          typeNumber: 5,
          errorCorrectionLevel: "H",
        },
        dotsOptions: {
          color: dotColor,
          type: "square",
        },
        cornersSquareOptions: {
          type: "square",
          color: dotColor,
        },
        cornersDotOptions: {
          type: "square",
          color: dotColor,
        },
        backgroundOptions: {
          color: bgColor,
        },
        image: "chessreel-logo.svg",
        imageOptions: {
          hideBackgroundDots: true,
          imageSize: 0.4,
          margin: 4,
        },
      });
      const container = document.getElementById(id);
      qr.append(container);

      // Add background rect behind the logo image (light cards only —
      // dark cards let the checkerboard show through)
      function addLogoBackground(svg) {
        if (dark) return;
        const imageEl = svg.querySelector("image");
        if (!imageEl) return;
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", imageEl.getAttribute("x"));
        rect.setAttribute("y", imageEl.getAttribute("y"));
        rect.setAttribute("width", imageEl.getAttribute("width"));
        rect.setAttribute("height", imageEl.getAttribute("height"));
        rect.setAttribute("fill", "#ffffff");
        imageEl.parentNode.insertBefore(rect, imageEl);
      }

      // qr-code-styling renders async — poll until the image element appears
      const check = setInterval(() => {
        const svg = container.querySelector("svg");
        if (!svg) return;
        const imageEl = svg.querySelector("image");
        if (!imageEl || !imageEl.getAttribute("x")) return;
        clearInterval(check);
        addLogoBackground(svg);
        readyCount++;
        if (readyCount === cards.length) onAllQRReady();
      }, 50);
    });

    // Convert external logo <image> hrefs to inline base64 data URLs,
    // and strip white background rects from dark-card logos.
    async function inlineLogoImages() {
      const images = document.querySelectorAll(".qr-container svg image");
      for (const img of images) {
        const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
        if (!href) continue;
        const isDarkCard = img.closest(".card-dark") !== null;

        let text;
        if (href.startsWith("data:image/svg+xml;base64,")) {
          // QRCodeStyling already inlined it — decode to get SVG text
          text = decodeURIComponent(escape(atob(href.split(",")[1])));
        } else if (!href.startsWith("data:")) {
          // External URL — fetch it
          const resp = await fetch(href);
          text = await resp.text();
        } else {
          continue; // non-SVG data URL, skip
        }

        if (isDarkCard) {
          text = text.replace(/<rect[^>]*width="1800"[^>]*fill="#ffffff"[^>]*\/>/g, "");
        }

        const dataUrl = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(text)));
        img.setAttribute("href", dataUrl);
        img.removeAttributeNS("http://www.w3.org/1999/xlink", "href");
      }
    }

    async function onAllQRReady() {
      await inlineLogoImages();
      // Apply canvas-rendered background to dark cards — same image used for PDF,
      // so preview and PDF are pixel-identical for the background layer.
      const darkBg = generateDarkBackground();
      document.querySelectorAll(".card-dark").forEach(card => {
        card.style.background = `url(${darkBg}) center/100% 100% no-repeat`;
      });
      document.querySelectorAll(".download-btn").forEach(btn => btn.disabled = false);
    }

    // Load Fredoka font for PDF embedding (fetched once, cached)
    let fredokaBase64 = null;
    async function loadFredokaFont() {
      if (fredokaBase64) return fredokaBase64;
      const resp = await fetch("Fredoka-Regular.ttf");
      const buffer = await resp.arrayBuffer();
      const bytes = new Uint8Array(buffer);
      let binary = "";
      for (let i = 0; i < bytes.length; i += 8192) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
      }
      fredokaBase64 = btoa(binary);
      return fredokaBase64;
    }

    // Dark card background — rendered once on a canvas, shared by preview and PDF
    const DARK_BASE = "#0d0a1f";
    const DARK_SQUARE = "#16122e";
    const DARK_BG_PX_PER_MM = 20;  // 508 DPI — sharp enough for print

    let darkBgDataUrl = null;
    function generateDarkBackground() {
      if (darkBgDataUrl) return darkBgDataUrl;
      const w = TRIM_W * DARK_BG_PX_PER_MM;
      const h = TRIM_H * DARK_BG_PX_PER_MM;
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");

      // 1. Fill base color
      ctx.fillStyle = DARK_BASE;
      ctx.fillRect(0, 0, w, h);

      // 2. Draw checkerboard — 8 squares across trim width
      const sqPx = (TRIM_W / 8) * DARK_BG_PX_PER_MM;
      ctx.fillStyle = DARK_SQUARE;
      const cols = Math.ceil(w / sqPx);
      const rows = Math.ceil(h / sqPx);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 === 0) {
            ctx.fillRect(c * sqPx, r * sqPx, sqPx, sqPx);
          }
        }
      }

      // 3. Radial gradient overlay — subtle lightening at center
      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.max(w, h) * 0.7;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0, "rgba(30, 20, 70, 0.35)");
      grad.addColorStop(1, "transparent");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      darkBgDataUrl = canvas.toDataURL("image/png");
      return darkBgDataUrl;
    }

    // Rasterise an SVG data-URL to a transparent PNG data-URL at the given size.
    // svg2pdf can't composite an embedded SVG image with transparency, but it
    // handles PNG alpha just fine.
    function svgDataUrlToPngDataUrl(svgDataUrl, size) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          c.width = size;
          c.height = size;
          const ctx = c.getContext("2d");
          // No fill — canvas defaults to transparent
          ctx.drawImage(img, 0, 0, size, size);
          resolve(c.toDataURL("image/png"));
        };
        img.src = svgDataUrl;
      });
    }

    // PDF generation — uses the shared layout constants defined above
    async function generatePrintPDF(cardName) {
      const { jsPDF } = window.jspdf;
      const card = cards.find(c => c.name === cardName);
      const container = document.getElementById(card.id);
      const svgEl = container.querySelector("svg");

      // Clone SVG and strip pixel dimensions so svg2pdf uses viewBox + our size options
      const svgClone = svgEl.cloneNode(true);
      svgClone.removeAttribute("width");
      svgClone.removeAttribute("height");

      // For dark cards: remove logo <image> and transparent bg rect from the
      // SVG clone so svg2pdf renders only the QR dots. We'll add the logo
      // separately via doc.addImage() which handles PNG alpha correctly.
      let darkLogoInfo = null;
      if (card.dark) {
        const bgRect = svgClone.querySelector("rect");
        if (bgRect && bgRect.getAttribute("fill") === "transparent") {
          bgRect.remove();
        }
        const logoImg = svgClone.querySelector("image");
        if (logoImg) {
          const logoHref = logoImg.getAttribute("href");
          // Save position info (in SVG viewBox coords, 0-400) before removing
          const x = parseFloat(logoImg.getAttribute("x"));
          const y = parseFloat(logoImg.getAttribute("y"));
          const w = parseFloat(logoImg.getAttribute("width"));
          const h = parseFloat(logoImg.getAttribute("height"));
          logoImg.remove();
          if (logoHref && logoHref.startsWith("data:image/svg+xml")) {
            const pngUrl = await svgDataUrlToPngDataUrl(logoHref, 800);
            darkLogoInfo = { pngUrl, x, y, w, h };
          }
        }
      }

      const doc = new jsPDF({
        orientation: "landscape",
        unit: "mm",
        format: [PAGE_W, PAGE_H],
      });

      if (card.dark) {
        // Dark variant: fill bleed with base color, then place the shared
        // background image (same one used for CSS preview) in the trim area
        doc.setFillColor(13, 10, 31); // DARK_BASE #0d0a1f
        doc.rect(0, 0, PAGE_W, PAGE_H, "F");
        const darkBg = generateDarkBackground();
        doc.addImage(darkBg, "PNG", BLEED, BLEED, TRIM_W, TRIM_H);
      } else {
        // White background covering full page (extends into bleed)
        doc.setFillColor(255, 255, 255);
        doc.rect(0, 0, PAGE_W, PAGE_H, "F");
      }

      const qrX = BLEED + QR_X_IN_TRIM;
      const qrY = BLEED + QR_Y_IN_TRIM;

      // Render SVG as vector into PDF
      const { svg2pdf } = window.svg2pdf;
      await svg2pdf(svgClone, doc, {
        x: qrX,
        y: qrY,
        width: QR_SIZE,
        height: QR_SIZE,
      });

      // For dark cards, add the logo as a separate PNG image with transparency
      if (darkLogoInfo) {
        const { pngUrl, x, y, w, h } = darkLogoInfo;
        // Convert SVG viewBox coords (0–400) to mm within the QR area
        const scale = QR_SIZE / 400;
        doc.addImage(pngUrl, "PNG",
          qrX + x * scale, qrY + y * scale,
          w * scale, h * scale);
      }

      // Embed Fredoka font to match the on-screen preview
      const fontData = await loadFredokaFont();
      doc.addFileToVFS("Fredoka-Regular.ttf", fontData);
      doc.addFont("Fredoka-Regular.ttf", "Fredoka", "normal");
      doc.setFont("Fredoka", "normal");
      doc.setFontSize(4.5);

      if (card.dark) {
        doc.setTextColor(180, 180, 210);
      } else {
        doc.setTextColor(153, 153, 153);
      }
      doc.text(card.url, BLEED + TEXT_X_IN_TRIM, BLEED + TEXT_Y_IN_TRIM);

      doc.save(`${cardName}-business-card.pdf`);
    }

    // Button click handlers
    cards.forEach(({ name, dark }) => {
      const btn = document.getElementById(`btn-${name}`);
      const label = dark ? "Download Dark PDF" : "Download Print PDF";
      btn.addEventListener("click", async function () {
        this.disabled = true;
        this.textContent = "Generating…";
        try { await generatePrintPDF(name); }
        finally { this.disabled = false; this.textContent = label; }
      });
    });
  </script>
</body>
</html>
